name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.44.0'

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: |
          find test -maxdepth 1 -name '*_test.dart' \
            ! -name 'integration_smb_real_test.dart' \
            ! -name 'ui_automation_test.dart' \
            -print0 | sort -z | xargs -0 flutter test

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: analyze-and-test
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: cd macos && pod install

      - name: Build macOS (release, no codesign)
        run: flutter build macos --release

      - name: Package DMG
        run: scripts/make_dmg.sh build/Open-Filmly-${{ github.ref_name }}-macos.dmg

      - name: Upload macOS release asset
        uses: actions/upload-artifact@v4
        with:
          name: open-filmly-macos-release-asset
          path: app/build/Open-Filmly-${{ github.ref_name }}-macos.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: analyze-and-test
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows zip
        shell: pwsh
        run: |
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath build/Open-Filmly-${{ github.ref_name }}-windows-x64.zip

      - name: Upload Windows release asset
        uses: actions/upload-artifact@v4
        with:
          name: open-filmly-windows-release-asset
          path: app/build/Open-Filmly-${{ github.ref_name }}-windows-x64.zip
          if-no-files-found: error

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    steps:
      - name: Download macOS asset
        uses: actions/download-artifact@v4
        with:
          name: open-filmly-macos-release-asset
          path: build/release-assets

      - name: Download Windows asset
        uses: actions/download-artifact@v4
        with:
          name: open-filmly-windows-release-asset
          path: build/release-assets

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          macos_asset="build/release-assets/Open-Filmly-${tag}-macos.dmg"
          windows_asset="build/release-assets/Open-Filmly-${tag}-windows-x64.zip"

          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${macos_asset}" "${windows_asset}" \
              --clobber \
              --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${tag}" "${macos_asset}" "${windows_asset}" \
              --generate-notes \
              --title "${tag}" \
              --repo "${GITHUB_REPOSITORY}"
          fi
