name: Build Windows ARM64

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'windows/**'
      - 'lib/**'
      - 'pubspec.yaml'
      - 'packages/**'
      - '.github/workflows/build-windows-arm64.yml'

jobs:
  build-windows-arm64:
    name: Windows ARM64 release zip
    # Native ARM64 Windows runner.
    runs-on: windows-11-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Flutter does not ship a prebuilt Windows-ARM64 SDK archive that
      # subosito/flutter-action can download. Clone stable from git instead;
      # on an ARM64 host `flutter build windows` produces arm64 binaries.
      - name: Install Flutter (git clone, stable)
        shell: pwsh
        run: |
          $flutterRoot = Join-Path $env:USERPROFILE "flutter"
          if (Test-Path $flutterRoot) { Remove-Item $flutterRoot -Recurse -Force }
          git clone https://github.com/flutter/flutter.git -b stable --depth 1 $flutterRoot
          Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $flutterRoot "bin")
          Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $flutterRoot "bin\cache\dart-sdk\bin")

      - name: Flutter doctor / enable Windows
        shell: pwsh
        run: |
          flutter --version
          flutter config --enable-windows-desktop
          flutter precache --windows
          flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release (ARM64 host)
        run: flutter build windows --release -v

      - name: Detect release output dir
        id: out
        shell: pwsh
        run: |
          $candidates = @(
            "build\windows\arm64\runner\Release",
            "build\windows\x64\runner\Release",
            "build\windows\runner\Release"
          )
          $found = $null
          foreach ($p in $candidates) {
            if (Test-Path $p) { $found = $p; break }
          }
          if (-not $found) {
            Write-Host "=== build/windows tree ==="
            Get-ChildItem -Recurse build\windows -ErrorAction SilentlyContinue |
              Select-Object -First 80 FullName
            throw "Windows Release output not found"
          }
          Write-Host "Using output: $found"
          "path=$found" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Get-ChildItem $found | Format-Table Name, Length

      - name: Package zip
        shell: pwsh
        run: |
          $src = "${{ steps.out.outputs.path }}"
          $out = "build\Open-Filmly-windows-arm64.zip"
          if (Test-Path $out) { Remove-Item $out -Force }
          Compress-Archive -Path "$src\*" -DestinationPath $out
          Get-Item $out | Format-List Name, Length, FullName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-filmly-windows-arm64
          path: build/Open-Filmly-windows-arm64.zip
          if-no-files-found: error
