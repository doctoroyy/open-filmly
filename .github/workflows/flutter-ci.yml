name: Flutter CI

on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.0'

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: |
          find test -maxdepth 1 -name '*_test.dart' \
            ! -name 'integration_smb_real_test.dart' \
            ! -name 'ui_automation_test.dart' \
            -print0 | sort -z | xargs -0 flutter test

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: analyze-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: cd macos && pod install

      - name: Build macOS (release, no codesign)
        run: flutter build macos --release

      - name: Package DMG
        run: scripts/make_dmg.sh build/Open-Filmly.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-filmly-macos-dmg
          path: build/Open-Filmly.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: analyze-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-filmly-windows-release
          path: build/windows/x64/runner/Release/**
          if-no-files-found: error

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APKs
        run: flutter build apk --release --split-per-abi

      - name: Upload Android APKs
        uses: actions/upload-artifact@v4
        with:
          name: open-filmly-android-apks
          path: build/app/outputs/flutter-apk/*-release.apk
          if-no-files-found: error

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: analyze-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: cd ios && pod install

      - name: Build iOS (release, no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package unsigned iOS app
        run: ditto -c -k --sequesterRsrc --keepParent build/ios/iphoneos/Runner.app build/Open-Filmly-iOS-unsigned.zip

      - name: Upload unsigned iOS app
        uses: actions/upload-artifact@v4
        with:
          name: open-filmly-ios-unsigned
          path: build/Open-Filmly-iOS-unsigned.zip
          if-no-files-found: error
